name: CI

on:
  push:
    branches: [master, "refactor/**"]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint, typecheck, test, build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Browser bundle hygiene check
        run: |
          if grep -E "node:|require\(['\"]crypto|require\(['\"]buffer|require\(['\"]fs" dist/index.browser.js; then
            echo "::error::Browser bundle contains forbidden Node imports"
            exit 1
          fi
